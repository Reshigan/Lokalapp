name = "lokal-api"
main = "src/worker.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "production"
# Public values only. Secrets go via `wrangler secret put`.
# See README — JWT_SECRET, VAPID_PUBLIC_KEY, VAPID_PRIVATE_KEY, VAPID_SUBJECT, PAYFAST_*
VAPID_SUBJECT = "mailto:admin@lokal.local"
FRONTEND_URL = "https://lokal.vantax.co.za"

# D1 database binding
[[d1_databases]]
binding = "DB"
database_name = "lokal-db"
database_id = "3322e9a8-3836-4c66-8098-aa5e31a9ab5c"
migrations_dir = "migrations"
